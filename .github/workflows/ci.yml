name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      FCE_ENV: ci
      FCE_MARKET_DATA_PROVIDER: mock
      FCE_DATABASE_URL: sqlite:///:memory:
      FCE_RUN_LIVE_BITGET_TESTS: "false"
      FCE_WORKER_ENABLED: "false"
      FCE_TELEGRAM_BOT_ENABLED: "false"
      FCE_TELEGRAM_ALERTS_ENABLED: "false"
      FCE_OPENAI_API_KEY: ""
      FCE_COINGLASS_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Import cycle check
        run: python scripts/check_import_cycles.py

      - name: Mypy baseline
        run: python scripts/check_mypy_baseline.py

      - name: Pytest with coverage
        run: python -m pytest --cov=app --cov-report=term --cov-report=xml --cov-report=json:coverage.json --cov-fail-under=70

      - name: Quality baseline
        run: python scripts/check_quality_baseline.py

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/coverage.json

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8875
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8875
      FCE_E2E_DATABASE_URL: sqlite:////tmp/fce-e2e-ci.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browser
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Playwright demo-mode smoke and visual tests
        working-directory: dashboard
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            dashboard/test-results
            dashboard/playwright-report
